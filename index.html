<!DOCTYPE html>
<html lang="es-MX">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Don Caja</title>

<meta name="theme-color"
content="#0F172A">

<meta name="description"
content="Don Caja - Mándame un mensaje. Yo llevo tu negocio.">

<style>

:root{

--bg:#0F172A;
--card:#1E293B;
--primary:#22C55E;
--text:#F8FAFC;
--sub:#94A3B8;
--radius:18px;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

background:var(--bg);
color:var(--text);

padding:20px;

}

h1{

font-size:34px;

margin-bottom:10px;

}

p{

color:var(--sub);

margin-bottom:25px;

line-height:1.6;

}

.card{

background:var(--card);

padding:20px;

border-radius:var(--radius);

}

textarea{

width:100%;

height:170px;

border:none;

outline:none;

resize:none;

padding:15px;

margin-top:15px;

border-radius:15px;

font-size:16px;

background:#111827;

color:white;

}

button{

width:100%;

margin-top:18px;

padding:18px;

border:none;

border-radius:15px;

background:var(--primary);

font-size:18px;

font-weight:bold;

color:white;

cursor:pointer;

}

footer{

margin-top:30px;

text-align:center;

font-size:14px;

color:var(--sub);

}

</style>

</head>

<body>

<h1>

💼 Don Caja

</h1>

<p>

Mándame un mensaje.

Yo llevo tu negocio.

</p>

<div class="card">

<textarea
id="mensaje"
placeholder="Ejemplo:

Vendí 3 hamburguesas por 420 pesos"></textarea>

<button id="registrar">

Registrar

</button>

</div>

<footer>

Versión 0.0.1

</footer>

<script>

const mensaje=document.getElementById("mensaje");

const registrar=document.getElementById("registrar");

registrar.onclick=()=>{

if(mensaje.value.trim()==""){

alert("Cuéntame qué pasó hoy.");

return;

}

alert("Muy pronto Don Caja entenderá este mensaje:\n\n"+mensaje.value);

mensaje.value="";

}

</script>

</body>

</html>
