<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Caja - Tu Copiloto</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlOyRg0e_bv6yXI4gtO-e0sgNoFPVkI14",
            authDomain: "don-caja-app.firebaseapp.com",
            projectId: "don-caja-app",
            storageBucket: "don-caja-app.firebasestorage.app",
            messagingSenderId: "529138964879",
            appId: "1:529138964879:web:88e3baf0c50454c6bb93fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Registrar
        window.registrarDato = async () => {
            const mensaje = document.getElementById("mensaje").value;
            if (!mensaje.trim()) return;
            const montoMatch = mensaje.match(/(\d+)\s*(?:pesos|mxn|\$)/i);
            const monto = montoMatch ? parseInt(montoMatch[1]) : 0;
            await addDoc(collection(db, "registros"), { descripcion: mensaje, monto: monto, timestamp: new Date() });
            document.getElementById("mensaje").value = "";
        };

        // Exportar a CSV
        window.exportarCSV = async () => {
            const snapshot = await getDocs(collection(db, "registros"));
            let csv = "Fecha,Descripcion,Monto\n";
            snapshot.forEach(doc => {
                const d = doc.data();
                csv += `${d.timestamp.toDate().toLocaleDateString()},${d.descripcion.replace(/,/g, "")},${d.monto}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Reporte_DonCaja.csv";
            a.click();
        };

        // Historial
        onSnapshot(query(collection(db, "registros"), orderBy("timestamp", "desc"), limit(5)), (snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                html += `<div style="padding:8px; border-bottom:1px solid #eee; font-size:13px;"><strong>$${d.monto}</strong> - ${d.descripcion}</div>`;
            });
            document.getElementById("historial").innerHTML = html;
        });
    </script>
    <style>
        :root { --bg: #FDFBF7; --primary: #228B22; }
        body { background: var(--bg); font-family: sans-serif; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 20px; max-width: 400px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 80px; margin-top: 10px; border-radius: 10px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }
        .btn-reg { background: var(--primary); }
        .btn-exp { background: #3498db; }
        .btn-stripe { background: #635bff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Don Caja 💼</h1>
        <textarea id="mensaje" placeholder="Ej: Vendí 3 hamburguesas por 420 pesos"></textarea>
        <button class="btn-reg" onclick="registrarDato()">¡Anotado, Don Caja!</button>
        <button class="btn-exp" onclick="exportarCSV()">Descargar Reporte (CSV)</button>
        <div id="historial" style="margin-top:20px;"></div>
        <a href="TU_URL_DE_STRIPE_AQUI" style="text-decoration:none;">
            <button class="btn-stripe">Suscribirse</button>
        </a>
    </div>
</body>
</html>
