<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Supabase</title>
    <!-- Cargamos Supabase directamente -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 15px; margin: 5px 0; cursor: pointer; }
        #resultado { background: #f4f4f4; padding: 15px; border: 1px solid #ddd; margin-top: 15px; min-height: 50px; }
        .seccion { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>Conexión a tu Base de Datos</h1>

    <!-- SECCIÓN PARA LEER DATOS -->
    <div class="seccion">
        <h2>1. Leer Datos</h2>
        <button onclick="traerDatos()">Obtener información de la tabla</button>
        <pre id="resultado">Aquí aparecerán los datos...</pre>
    </div>

    <!-- SECCIÓN PARA INSERTAR DATOS -->
    <div class="seccion">
        <h2>2. Insertar Datos de Prueba</h2>
        <p>Abre el código y cambia <b>nombre_columna_1</b> por una columna real de tu tabla antes de presionar este botón.</p>
        <button onclick="insertarDatos()">Guardar un nuevo registro</button>
    </div>

    <script>
        // 1. TUS LLAVES (Ya configuradas)
        const supabaseUrl = 'https://lieysjlpiwsqjsdmcaay.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpZXlzamxwaXdzcWpzZG1jYWF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDYzNDAsImV4cCI6MjA5ODM4MjM0MH0.fCWLx6mi9qkhT-AgG_CeQPBIlFV65Bv8gix9zWnEteE';
        
        // 2. INICIALIZAR CONEXIÓN
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- ATENCIÓN: CAMBIA ESTO ---
        const NOMBRE_DE_LA_TABLA = 'TU_TABLA_AQUI'; // Pon el nombre real de tu tabla
        // -----------------------------

        // 3. FUNCIÓN PARA LEER DATOS
        async function traerDatos() {
            document.getElementById('resultado').innerHTML = "Cargando...";
            
            const { data, error } = await supabase
                .from(NOMBRE_DE_LA_TABLA)
                .select('*');

            if (error) {
                document.getElementById('resultado').innerHTML = "ERROR: " + error.message;
            } else {
                document.getElementById('resultado').innerHTML = JSON.stringify(data, null, 2);
            }
        }

        // 4. FUNCIÓN PARA INSERTAR DATOS
        async function insertarDatos() {
            // --- ATENCIÓN: CAMBIA LAS COLUMNAS ---
            // Reemplaza "nombre_columna_1" por el nombre real de una columna en tu tabla de Supabase
            const nuevoRegistro = {
                nombre_columna_1: "Texto de prueba desde HTML" 
            };
            
            const { data, error } = await supabase
                .from(NOMBRE_DE_LA_TABLA)
                .insert([nuevoRegistro])
                .select();

            if (error) {
                alert("Hubo un error al insertar: " + error.message);
            } else {
                alert("¡Registro insertado con éxito!");
                traerDatos(); // Actualiza la lista en pantalla automáticamente
            }
        }
    </script>
</body>
</html>
