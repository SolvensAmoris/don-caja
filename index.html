<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Caja - Tu Copiloto</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TUS CREDENCIALES (Cámbialas por las de tu consola Firebase)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica de registro
        window.registrarDato = async () => {
            const mensaje = document.getElementById("mensaje").value;
            const feedback = document.getElementById("feedback");

            if (mensaje.trim() === "") {
                feedback.innerText = "¡Oye! No me dijiste nada.";
                return;
            }

            try {
                await addDoc(collection(db, "registros"), {
                    texto: mensaje,
                    fecha: new Date().toISOString()
                });
                feedback.innerText = "✅ ¡Anotado, Don Caja!";
                document.getElementById("mensaje").value = "";
            } catch (e) {
                feedback.innerText = "Error, intenta de nuevo.";
            }
        };
    </script>
    <style>
        :root { --bg: #FDFBF7; --primary: #228B22; }
        body { background: var(--bg); font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; padding: 10px; border-radius: 10px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Don Caja 💼</h1>
        <textarea id="mensaje" placeholder="Ej: Vendí 3 hamburguesas por 420 pesos"></textarea>
        <button onclick="registrarDato()">¡Anotado, Don Caja!</button>
        <p id="feedback"></p>
    </div>

</body>
</html>
