<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Caja - Tu Copiloto</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const MI_CONTRASENA = "Caja"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBlOyRg0e_bv6yXI4gtO-e0sgNoFPVkI14",
            authDomain: "don-caja-app.firebaseapp.com",
            projectId: "don-caja-app",
            storageBucket: "don-caja-app.firebasestorage.app",
            messagingSenderId: "529138964879",
            appId: "1:529138964879:web:88e3baf0c50454c6bb93fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Seguridad
        window.verificarClave = () => {
            if(document.getElementById('pass').value === MI_CONTRASENA) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
            } else {
                alert("Clave incorrecta, compa.");
            }
        };

        // Lógica Don Caja
        window.registrarDato = async () => {
            const msg = document.getElementById("mensaje").value;
            if (!msg.trim()) return;
            const m = msg.match(/(\d+)\s*(?:pesos|mxn|\$)/i);
            await addDoc(collection(db, "registros"), { desc: msg, monto: m ? parseInt(m[1]) : 0, ts: new Date() });
            document.getElementById("mensaje").value = "";
        };

        window.exportarCSV = async () => {
            const snap = await getDocs(collection(db, "registros"));
            let csv = "Fecha,Descripcion,Monto\n";
            snap.forEach(d => { csv += `${d.data().ts.toDate().toLocaleDateString()},${d.data().desc.replace(/,/g, "")},${d.data().monto}\n`; });
            const url = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            const a = document.createElement('a'); a.href = url; a.download = "Reporte.csv"; a.click();
        };

        onSnapshot(query(collection(db, "registros"), orderBy("ts", "desc")), (snap) => {
            let histHtml = "", totalHoy = 0, hoy = new Date().toDateString();
            snap.forEach(doc => {
                const d = doc.data();
                if (d.ts.toDate().toDateString() === hoy) totalHoy += d.monto;
                histHtml += `<div style="padding:8px; border-bottom:1px solid #eee;"><strong>$${d.monto}</strong> - ${d.desc}</div>`;
            });
            document.getElementById("totalHoy").innerText = "$" + totalHoy;
            document.getElementById("historial").innerHTML = histHtml;
        });
    </script>
    <style>
        :root { --bg:#FDFBF7; --primary:#228B22; }
        body { background:var(--bg); font-family:sans-serif; padding:15px; display:flex; justify-content:center; }
        .card { background:white; padding:20px; border-radius:20px; max-width:400px; width:100%; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
        input, textarea { width:100%; padding:12px; margin:5px 0; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
        button { width:100%; padding:12px; margin-top:8px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; color:white; }
    </style>
</head>
<body>
    <div class="card" id="auth-screen">
        <h1>🔐 Don Caja</h1>
        <input type="password" id="pass" placeholder="Clave de acceso">
        <button style="background:var(--primary);" onclick="verificarClave()">Entrar</button>
    </div>
    <div class="card" id="app-screen" style="display:none;">
        <h1>Don Caja 💼</h1>
        <div style="background:#E8F5E9; padding:10px; text-align:center; border-radius:10px;">Ventas hoy: <b id="totalHoy">$0</b></div>
        <textarea id="mensaje" placeholder="Ej: Vendí 3 hamburguesas por 420 pesos"></textarea>
        <button style="background:var(--primary);" onclick="registrarDato()">¡Anotado!</button>
        <button style="background:#3498db;" onclick="exportarCSV()">Descargar Reporte</button>
        <div id="historial" style="margin-top:20px; font-size:13px;"></div>
    </div>
</body>
</html>
