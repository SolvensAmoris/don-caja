<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Caja - Tu Copiloto</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlOyRg0e_bv6yXI4gtO-e0sgNoFPVkI14",
            authDomain: "don-caja-app.firebaseapp.com",
            projectId: "don-caja-app",
            storageBucket: "don-caja-app.firebasestorage.app",
            messagingSenderId: "529138964879",
            appId: "1:529138964879:web:88e3baf0c50454c6bb93fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.registrarDato = async () => {
            const mensaje = document.getElementById("mensaje").value;
            const feedback = document.getElementById("feedback");

            if (!mensaje.trim()) {
                feedback.innerText = "¡Cuéntame qué pasó en el negocio!";
                return;
            }

            const montoMatch = mensaje.match(/(\d+)\s*(?:pesos|mxn|\$)/i);
            const monto = montoMatch ? parseInt(montoMatch[1]) : 0;

            try {
                await addDoc(collection(db, "registros"), {
                    descripcion: mensaje,
                    monto: monto,
                    fecha: new Date().toLocaleString()
                });
                feedback.style.color = "#228B22";
                feedback.innerText = "✅ ¡Anotado! Detecté $" + monto + ". ¡Bien ahí!";
                document.getElementById("mensaje").value = "";
            } catch (e) {
                feedback.innerText = "Error: " + e.message;
            }
        };
    </script>
    <style>
        :root { --bg: #FDFBF7; --primary: #228B22; --text: #2D3436; }
        body { background: var(--bg); font-family: Arial, sans-serif; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; max-width: 400px; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); margin-top: 0; }
        textarea { width: 100%; height: 120px; margin-top: 15px; border-radius: 12px; border: 1px solid #ccc; padding: 12px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 18px; margin-top: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1A6B1A; }
        #feedback { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Don Caja 💼</h1>
        <p>¿Qué pasó hoy en el negocio?</p>
        <textarea id="mensaje" placeholder="Ej: Vendí 3 hamburguesas por 420 pesos"></textarea>
        <button onclick="registrarDato()">¡Anotado, Don Caja!</button>
        <p id="feedback"></p>
    </div>
</body>
</html>
